<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050810" />
    <title>RouteWings — Canlı uçuş</title>
    <style>
      :root {
        --bg: #050810;
        --glass: rgba(12, 18, 32, 0.72);
        --glass-border: rgba(255, 255, 255, 0.1);
        --blue-cta-from: #2563eb;
        --blue-cta-to: #38bdf8;
        --path-glow: rgba(250, 204, 21, 0.55);
        --lime: #a3e635;
        --radius: 1.35rem;
        --shadow-deep: 0 24px 64px rgba(0, 0, 0, 0.65),
          0 0 0 1px rgba(255, 255, 255, 0.04);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(
            ellipse 120% 80% at 50% -20%,
            rgba(37, 99, 235, 0.18),
            transparent 55%
          ),
          var(--bg);
        color: #f8fafc;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 500px;
        margin: 0 auto;
        padding: max(12px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(0.85);
          opacity: 0.65;
        }
        70% {
          transform: scale(1.35);
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }
      @keyframes plane-drift {
        0%,
        100% {
          filter: drop-shadow(0 0 14px rgba(56, 189, 248, 0.55));
        }
        50% {
          filter: drop-shadow(0 0 22px rgba(56, 189, 248, 0.85));
        }
      }
      .reveal {
        animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .reveal-delay-1 {
        animation-delay: 0.08s;
        opacity: 0;
      }
      .reveal-delay-2 {
        animation-delay: 0.16s;
        opacity: 0;
      }
      .reveal-delay-3 {
        animation-delay: 0.24s;
        opacity: 0;
      }
      .card {
        border-radius: calc(var(--radius) + 4px);
        overflow: hidden;
        box-shadow: var(--shadow-deep);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(
          165deg,
          rgba(15, 23, 42, 0.95) 0%,
          rgba(5, 8, 16, 0.98) 100%
        );
        backdrop-filter: blur(20px);
      }
      .top-bar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px 10px;
        position: relative;
        z-index: 3;
      }
      .flight-no {
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      .route-line {
        font-size: 0.78rem;
        color: rgba(226, 232, 240, 0.88);
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .route-line .plane-ico {
        opacity: 0.85;
      }
      .airline-block {
        display: flex;
        align-items: center;
        gap: 8px;
        text-align: right;
        min-width: 0;
      }
      .airline-logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 4px;
        flex-shrink: 0;
      }
      .airline-logo.fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 800;
        color: #e2e8f0;
      }
      .airline-name {
        font-size: 0.72rem;
        font-weight: 600;
        color: rgba(203, 213, 225, 0.95);
        line-height: 1.25;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .map-shell {
        position: relative;
        height: min(56vh, 380px);
        min-height: 240px;
        margin: 0 10px;
        border-radius: var(--radius);
        overflow: hidden;
        isolation: isolate;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35),
          0 16px 40px rgba(0, 0, 0, 0.45);
      }
      .map-parallax {
        position: absolute;
        inset: -12%;
        background-image: url("https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=1800&q=85");
        background-size: cover;
        background-position: 52% 42%;
        will-change: transform;
        transform: scale(1.08);
        transition: transform 0.15s ease-out;
      }
      .map-overlay-tint {
        position: absolute;
        inset: 0;
        background: linear-gradient(
            180deg,
            rgba(5, 8, 16, 0.25) 0%,
            transparent 35%,
            rgba(5, 8, 16, 0.55) 100%
          ),
          radial-gradient(
            ellipse 90% 60% at 50% 100%,
            rgba(5, 8, 16, 0.5),
            transparent 70%
          );
        pointer-events: none;
      }
      .cloud {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        filter: blur(24px);
        pointer-events: none;
      }
      .cloud.c1 {
        width: 45%;
        height: 22%;
        top: 8%;
        left: -5%;
        opacity: 0.55;
      }
      .cloud.c2 {
        width: 38%;
        height: 18%;
        top: 38%;
        right: -8%;
        opacity: 0.45;
      }
      .cloud.c3 {
        width: 55%;
        height: 20%;
        bottom: 5%;
        left: 20%;
        opacity: 0.35;
      }
      .city-label {
        position: absolute;
        z-index: 2;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(248, 250, 252, 0.92);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.85);
        pointer-events: none;
        max-width: 42%;
        line-height: 1.2;
      }
      .city-label.origin {
        left: 12px;
        bottom: 14px;
      }
      .city-label.dest {
        right: 12px;
        top: 52px;
        text-align: right;
      }
      .dest-pin-wrap {
        position: absolute;
        right: 18px;
        top: 88px;
        z-index: 4;
        pointer-events: none;
      }
      .dest-pin {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--lime);
        box-shadow: 0 0 0 3px rgba(163, 230, 53, 0.35),
          0 0 24px rgba(163, 230, 53, 0.65);
      }
      .dest-pin::after {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 2px solid rgba(163, 230, 53, 0.5);
        animation: pulse-ring 2s ease-out infinite;
      }
      .countdown-wrap {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        z-index: 5;
        padding: 12px 14px 0;
        text-align: center;
        pointer-events: none;
      }
      .countdown-main {
        font-weight: 800;
        font-size: clamp(0.85rem, 3.8vw, 1rem);
        color: rgba(248, 250, 252, 0.95);
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.75);
        line-height: 1.15;
      }
      .countdown-num {
        display: block;
        font-size: clamp(2.35rem, 11vw, 3.25rem);
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1;
        margin: 4px 0 2px;
        background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
      }
      .countdown-sub {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--lime);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }
      .countdown-sub.warn {
        color: #fbbf24;
      }
      .countdown-sub.muted {
        color: rgba(203, 213, 225, 0.85);
      }
      .route-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }
      .plane-wrap {
        position: absolute;
        z-index: 6;
        width: 36px;
        height: 36px;
        margin: -18px 0 0 -18px;
        animation: plane-drift 3.2s ease-in-out infinite;
        pointer-events: none;
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        transition: left 0.85s cubic-bezier(0.22, 1, 0.36, 1),
          top 0.85s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.55s ease;
      }
      .plane-wrap svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .status-strip {
        margin: 12px 18px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        font-size: 0.8rem;
        font-weight: 600;
        color: #e2e8f0;
      }
      .status-strip .check {
        color: var(--lime);
        font-size: 1rem;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .pill.ok {
        background: rgba(163, 230, 53, 0.15);
        color: #bef264;
        border: 1px solid rgba(163, 230, 53, 0.35);
      }
      .pill.delay {
        background: rgba(251, 191, 36, 0.12);
        color: #fcd34d;
        border: 1px solid rgba(251, 191, 36, 0.35);
      }
      .pill.land {
        background: rgba(52, 211, 153, 0.12);
        color: #6ee7b7;
        border: 1px solid rgba(52, 211, 153, 0.35);
      }
      .pill.board {
        background: rgba(56, 189, 248, 0.12);
        color: #7dd3fc;
        border: 1px solid rgba(56, 189, 248, 0.35);
      }
      .pill.cancel {
        background: rgba(248, 113, 113, 0.12);
        color: #fca5a5;
        border: 1px solid rgba(248, 113, 113, 0.35);
      }
      .pill.neutral {
        background: rgba(148, 163, 184, 0.12);
        color: #cbd5e1;
        border: 1px solid rgba(148, 163, 184, 0.25);
      }
      .grid-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 14px 18px 18px;
      }
      .info-card {
        border-radius: 14px;
        padding: 12px 12px 14px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(16px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
      .info-card.full {
        grid-column: 1 / -1;
      }
      .info-card .lbl {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(148, 163, 184, 0.95);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .info-card .val {
        margin-top: 6px;
        font-size: 1.35rem;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }
      .info-card .val.sm {
        font-size: 1.05rem;
      }
      .cta {
        display: block;
        width: calc(100% - 36px);
        margin: 0 18px 20px;
        padding: 16px 20px;
        border: none;
        border-radius: 16px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(
          135deg,
          var(--blue-cta-from) 0%,
          #1d4ed8 45%,
          var(--blue-cta-to) 100%
        );
        background-size: 200% 200%;
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        transition: transform 0.2s ease, box-shadow 0.2s ease,
          background-position 0.35s ease;
      }
      .cta:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 16px 40px rgba(37, 99, 235, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        background-position: 100% 50%;
      }
      .cta:active {
        transform: translateY(0) scale(0.99);
      }
      /* Skeleton */
      .skel {
        border-radius: calc(var(--radius) + 4px);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(15, 23, 42, 0.6);
      }
      .skel-bar {
        height: 56px;
        padding: 16px;
        display: flex;
        justify-content: space-between;
      }
      .skel-blob {
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        position: relative;
        overflow: hidden;
      }
      .skel-blob::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.06),
          transparent
        );
        animation: shimmer 1.4s ease-in-out infinite;
      }
      .skel-map {
        height: 280px;
        margin: 0 10px 10px;
        border-radius: var(--radius);
      }
      .skel-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 0 18px 18px;
      }
      .skel-cell {
        height: 88px;
        border-radius: 14px;
      }
      .skel-cta {
        height: 54px;
        margin: 0 18px 18px;
        border-radius: 16px;
      }
      .hidden {
        display: none !important;
      }
      /* Empty state */
      .empty-card {
        text-align: center;
        padding: 48px 28px 40px;
        border-radius: calc(var(--radius) + 4px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(
          165deg,
          rgba(20, 28, 48, 0.9),
          rgba(8, 12, 22, 0.95)
        );
        backdrop-filter: blur(20px);
        box-shadow: var(--shadow-deep);
      }
      .empty-card h2 {
        margin: 0 0 10px;
        font-size: 1.35rem;
        font-weight: 800;
      }
      .empty-card p {
        margin: 0 0 24px;
        color: rgba(203, 213, 225, 0.85);
        font-size: 0.9rem;
        line-height: 1.55;
      }
      .empty-card code {
        font-size: 0.75rem;
        display: block;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #93c5fd;
        word-break: break-all;
      }
      .demo-badge {
        display: inline-block;
        margin-top: 12px;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(251, 191, 36, 0.9);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="state-loading" class="skel reveal">
        <div class="skel-bar">
          <div class="skel-blob" style="width: 38%; height: 20px"></div>
          <div class="skel-blob" style="width: 72px; height: 40px"></div>
        </div>
        <div class="skel-blob skel-map"></div>
        <div class="skel-grid">
          <div class="skel-blob skel-cell"></div>
          <div class="skel-blob skel-cell"></div>
          <div class="skel-blob skel-cell"></div>
          <div class="skel-blob skel-cell"></div>
        </div>
        <div class="skel-blob skel-cta"></div>
      </div>

      <div id="state-empty" class="empty-card reveal hidden">
        <h2>Uçuş bulunamadı</h2>
        <p>
          Bu uçuş seçilen havalimanında listelenmiyor veya API şu an yanıt
          vermiyor. Parametreleri kontrol edin veya daha sonra tekrar deneyin.
        </p>
        <code id="empty-hint"></code>
        <span class="demo-badge" id="demo-note"></span>
      </div>

      <div id="state-card" class="card reveal hidden">
        <div class="top-bar reveal-delay-1">
          <div>
            <div class="flight-no" id="el-flight-no">—</div>
            <div class="route-line" id="el-route">—</div>
          </div>
          <div class="airline-block">
            <div>
              <div class="airline-name" id="el-airline-name">—</div>
            </div>
            <img
              id="el-airline-logo"
              class="airline-logo"
              alt=""
              width="40"
              height="40"
              loading="lazy"
            />
          </div>
        </div>

        <div class="map-shell reveal-delay-2" id="map-shell">
          <div class="map-parallax" id="map-parallax"></div>
          <div class="map-overlay-tint"></div>
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
          <div class="cloud c3"></div>
          <div class="city-label origin" id="el-city-o">—</div>
          <div class="city-label dest" id="el-city-d">—</div>
          <div class="dest-pin-wrap">
            <div class="dest-pin" aria-hidden="true"></div>
          </div>
          <div class="countdown-wrap">
            <div class="countdown-main" id="el-count-label"></div>
            <span class="countdown-num" id="el-count-num">—</span>
            <div class="countdown-sub" id="el-count-sub"></div>
          </div>
          <svg
            class="route-svg"
            viewBox="0 0 100 100"
            preserveAspectRatio="xMidYMid slice"
            aria-hidden="true"
          >
            <defs>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="1.2" result="b" />
                <feMerge>
                  <feMergeNode in="b" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path
              id="path-base"
              d="M 10 82 Q 42 78 52 48 T 90 14"
              fill="none"
              stroke="rgba(250,204,21,0.22)"
              stroke-width="2.2"
              stroke-linecap="round"
            />
            <path
              id="path-fill"
              d="M 10 82 Q 42 78 52 48 T 90 14"
              fill="none"
              stroke="#facc15"
              stroke-width="2.6"
              stroke-linecap="round"
              filter="url(#glow)"
            />
          </svg>
          <div class="plane-wrap" id="plane-wrap" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M21 8.5L12 12l-9-3.5L12 2l9 6.5z"
                fill="rgba(248,250,252,0.98)"
                stroke="rgba(15,23,42,0.25)"
                stroke-width="0.5"
              />
              <path
                d="M3 15.5l9 3.5 9-3.5"
                stroke="rgba(226,232,240,0.5)"
                stroke-width="1"
              />
            </svg>
          </div>
        </div>

        <div class="status-strip reveal-delay-2" id="el-phase-strip">
          <span class="pill" id="el-pill">—</span>
          <span class="check" aria-hidden="true">✓</span>
          <span id="el-phase-text">—</span>
        </div>

        <div class="grid-info reveal-delay-3">
          <div class="info-card">
            <div class="lbl">🕐 Tahmini varış saati</div>
            <div class="val" id="el-arr-est">—</div>
          </div>
          <div class="info-card">
            <div class="lbl">🚪 Kapı</div>
            <div class="val sm" id="el-gate">—</div>
          </div>
          <div class="info-card">
            <div class="lbl">🏢 Terminal</div>
            <div class="val sm" id="el-terminal">—</div>
          </div>
          <div class="info-card">
            <div class="lbl">✈ Kalkış saati</div>
            <div class="val" id="el-dep-time">—</div>
          </div>
          <div class="info-card full">
            <div class="lbl">🛩 Uçak tipi</div>
            <div class="val sm" id="el-aircraft">—</div>
          </div>
          <div class="info-card full">
            <div class="lbl">📏 Mesafe</div>
            <div class="val sm" id="el-distance">—</div>
          </div>
        </div>

        <button type="button" class="cta" id="btn-wa">
          + Sen de uçuşunu takip et
        </button>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        var DASH = "\u2014";
        var params = new URLSearchParams(window.location.search);
        var flightParam =
          params.get("flight") || params.get("number") || "TK2345";
        var airportParam = (params.get("airport") || "IST").trim().toUpperCase();
        var dateParam = params.get("date") || "";

        function parseUtc(iso) {
          if (!iso || typeof iso !== "string") return null;
          var t = Date.parse(iso.trim());
          return Number.isNaN(t) ? null : t;
        }

        function bestDepMs(d) {
          return (
            parseUtc(d.departure.actualUtc) ||
            parseUtc(d.departure.estimatedUtc) ||
            parseUtc(d.departure.scheduledUtc)
          );
        }

        function bestArrMs(d) {
          return (
            parseUtc(d.arrival.actualUtc) ||
            parseUtc(d.arrival.estimatedUtc) ||
            parseUtc(d.arrival.scheduledUtc)
          );
        }

        function progressFromTimes(depMs, arrMs, nowMs) {
          if (depMs == null || arrMs == null || arrMs <= depMs) return 0;
          if (nowMs <= depMs) return 0;
          if (nowMs >= arrMs) return 100;
          return Math.round(((nowMs - depMs) / (arrMs - depMs)) * 100);
        }

        function airlineIata(flightNo) {
          var m = String(flightNo).match(/^([A-Za-z]{2,3})/);
          return m ? m[1].toUpperCase().slice(0, 2) : "XX";
        }

        function turkishPill(detail) {
          var raw = (detail.statusRaw || "").toLowerCase();
          if (raw.indexOf("cancel") !== -1 || raw.indexOf("divert") !== -1) {
            return { text: "İptal", cls: "cancel" };
          }
          if (raw.indexOf("board") !== -1) {
            return { text: "Biniş Başladı", cls: "board" };
          }
          if (
            detail.statusLabel === "Arrived" ||
            raw.indexOf("arrived") !== -1 ||
            raw.indexOf("land") !== -1
          ) {
            return { text: "İniş Yapıldı", cls: "land" };
          }
          if (detail.statusLabel === "Delayed" || raw.indexOf("delay") !== -1) {
            return { text: "Gecikmeli", cls: "delay" };
          }
          if (
            detail.statusLabel === "Departed" ||
            raw.indexOf("depart") !== -1 ||
            raw.indexOf("enroute") !== -1 ||
            raw.indexOf("approach") !== -1
          ) {
            return { text: "Zamanında", cls: "ok" };
          }
          return { text: "Zamanında", cls: "ok" };
        }

        function phaseStripText(detail, pct, nowMs) {
          var raw = (detail.statusRaw || "").toLowerCase();
          if (raw.indexOf("cancel") !== -1) return "Uçuş iptal edildi";
          var arrMs = bestArrMs(detail);
          var depMs = bestDepMs(detail);
          if (
            detail.statusLabel === "Arrived" ||
            raw.indexOf("arrived") !== -1 ||
            (arrMs && nowMs >= arrMs)
          ) {
            return "Uçuş tamamlandı";
          }
          if (raw.indexOf("board") !== -1) return "Biniş devam ediyor";
          if (pct > 0 && pct < 100) return "Uçuş devam ediyor";
          if (depMs && nowMs < depMs) return "Kalkış bekleniyor";
          return "Uçuş devam ediyor";
        }

        function renderCountdown(detail, nowMs) {
          var depMs = bestDepMs(detail);
          var arrMs = bestArrMs(detail);
          var raw = (detail.statusRaw || "").toLowerCase();
          var labelEl = document.getElementById("el-count-label");
          var numEl = document.getElementById("el-count-num");
          var subEl = document.getElementById("el-count-sub");
          var wrap = document.getElementById("el-count-row");
          if (wrap) wrap.remove();
          numEl.style.display = "";
          labelEl.innerHTML = "";

          if (raw.indexOf("cancel") !== -1) {
            labelEl.textContent = "Uçuş iptal";
            numEl.textContent = "—";
            subEl.textContent = "Yardım için havayolunu arayın";
            subEl.className = "countdown-sub warn";
            return;
          }
          if (
            detail.statusLabel === "Arrived" ||
            raw.indexOf("arrived") !== -1 ||
            (arrMs && nowMs >= arrMs)
          ) {
            labelEl.textContent = "İniş tamamlandı";
            numEl.textContent = "\u2713";
            subEl.textContent = "Ho\u015f geldiniz";
            subEl.className = "countdown-sub muted";
            return;
          }
          if (depMs && nowMs < depMs) {
            var md = Math.max(0, Math.round((depMs - nowMs) / 60000));
            numEl.style.display = "none";
            var row = document.createElement("div");
            row.id = "el-count-row";
            row.style.cssText =
              "display:flex;align-items:baseline;justify-content:center;gap:0.2em;flex-wrap:wrap;margin:6px 0 4px;text-shadow:0 2px 20px rgba(0,0,0,0.75);";
            row.innerHTML =
              '<span style="font-size:clamp(0.82rem,3.5vw,0.95rem);font-weight:800;color:rgba(248,250,252,0.95)">Kalk\u0131\u015fa</span>' +
              '<span style="font-size:clamp(2.2rem,10vw,3rem);font-weight:900;letter-spacing:-0.04em;background:linear-gradient(180deg,#fff,#cbd5e1);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1">' +
              md +
              "</span>" +
              '<span style="font-size:clamp(0.82rem,3.5vw,0.95rem);font-weight:800;color:rgba(248,250,252,0.95)">Dakika Kald\u0131</span>';
            labelEl.parentNode.insertBefore(row, numEl);
            subEl.textContent = "Kapı bilgilerini kontrol edin";
            subEl.className = "countdown-sub muted";
            return;
          }
          if (arrMs && nowMs < arrMs) {
            var ma = Math.max(0, Math.round((arrMs - nowMs) / 60000));
            numEl.style.display = "none";
            var row2 = document.createElement("div");
            row2.id = "el-count-row";
            row2.style.cssText =
              "display:flex;align-items:baseline;justify-content:center;gap:0.2em;flex-wrap:wrap;margin:6px 0 4px;text-shadow:0 2px 20px rgba(0,0,0,0.75);";
            row2.innerHTML =
              '<span style="font-size:clamp(0.82rem,3.5vw,0.95rem);font-weight:800;color:rgba(248,250,252,0.95)">\u0130ni\u015fe</span>' +
              '<span style="font-size:clamp(2.2rem,10vw,3rem);font-weight:900;letter-spacing:-0.04em;background:linear-gradient(180deg,#fff,#cbd5e1);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1">' +
              ma +
              "</span>" +
              '<span style="font-size:clamp(0.82rem,3.5vw,0.95rem);font-weight:800;color:rgba(248,250,252,0.95)">Dakika Kald\u0131</span>';
            labelEl.parentNode.insertBefore(row2, numEl);
            subEl.textContent =
              detail.statusLabel === "Delayed"
                ? "Gecikme bildirildi"
                : "Zamanında inecek";
            subEl.className =
              "countdown-sub " +
              (detail.statusLabel === "Delayed" ? "warn" : "");
            return;
          }
          labelEl.textContent = "Bilgi";
          numEl.textContent = DASH;
          subEl.textContent = "Veri güncelleniyor";
          subEl.className = "countdown-sub muted";
        }

        function updatePathProgress(pct) {
          var pathFill = document.getElementById("path-fill");
          var pathBase = document.getElementById("path-base");
          var plane = document.getElementById("plane-wrap");
          var len = pathFill.getTotalLength();
          var p = Math.max(0, Math.min(100, pct)) / 100;
          var offset = len * (1 - p);
          pathFill.style.strokeDasharray = String(len);
          pathFill.style.strokeDashoffset = String(offset);
          pathBase.style.strokeDasharray = String(len);
          pathBase.style.strokeDashoffset = "0";
          var point = pathFill.getPointAtLength(len * p);
          plane.style.left = point.x + "%";
          plane.style.top = point.y + "%";
          var delta = 0.8;
          var p2 = pathFill.getPointAtLength(
            Math.min(len, Math.max(0, len * p + delta))
          );
          var ang =
            (Math.atan2(p2.y - point.y, p2.x - point.x) * 180) / Math.PI;
          plane.style.transform = "rotate(" + (ang + 90) + "deg)";
        }

        var DEMO = {
          found: true,
          detail: {
            flightNumber: "TK2345",
            airlineName: "Turkish Airlines",
            statusRaw: "Departed",
            statusLabel: "Departed",
            statusTone: "green",
            direction: "departure",
            contextAirportCode: "ADB",
            departure: {
              code: "ADB",
              name: "\u0130zmir",
              scheduledLocal: "17:30",
              estimatedLocal: "17:32",
              scheduledUtc: new Date().toISOString().slice(0, 11) + "14:30:00.000Z",
              estimatedUtc: new Date().toISOString().slice(0, 11) + "14:32:00.000Z",
            },
            arrival: {
              code: "IST",
              name: "\u0130stanbul",
              scheduledLocal: "18:45",
              estimatedLocal: "18:45",
              scheduledUtc: new Date().toISOString().slice(0, 11) + "15:45:00.000Z",
              estimatedUtc: new Date().toISOString().slice(0, 11) + "15:45:00.000Z",
            },
            gate: "A12",
            terminal: "1",
            gateMissing: false,
            terminalMissing: false,
            aircraftModel: "Airbus A321neo",
            tailNumber: "TC-XXX",
          },
        };

        function applyDemoTimes(demo) {
          var now = Date.now();
          var dep = new Date(now - 25 * 60000).toISOString();
          var arr = new Date(now + 28 * 60000).toISOString();
          demo.detail.departure.actualUtc = dep;
          demo.detail.departure.estimatedUtc = dep;
          demo.detail.arrival.estimatedUtc = arr;
          demo.detail.arrival.scheduledUtc = arr;
        }

        function bindParallax() {
          var shell = document.getElementById("map-shell");
          var layer = document.getElementById("map-parallax");
          shell.addEventListener("mousemove", function (e) {
            var r = shell.getBoundingClientRect();
            var cx = r.left + r.width / 2;
            var cy = r.top + r.height / 2;
            var dx = (e.clientX - cx) / r.width;
            var dy = (e.clientY - cy) / r.height;
            layer.style.transform =
              "translate(" +
              dx * 14 +
              "px," +
              dy * 10 +
              "px) scale(1.08)";
          });
          shell.addEventListener("mouseleave", function () {
            layer.style.transform = "translate(0,0) scale(1.08)";
          });
        }

        function approximateRouteKm(d) {
          var a = (d.departure.code || "").toUpperCase();
          var b = (d.arrival.code || "").toUpperCase();
          var table = {
            "ADB-IST": 328,
            "IST-ADB": 328,
            "SAW-IST": 48,
            "IST-SAW": 48,
            "ESB-IST": 352,
            "IST-ESB": 352,
            "AYT-IST": 483,
            "IST-AYT": 483,
            "ADB-SAW": 345,
            "SAW-ADB": 345,
          };
          var k = a + "-" + b;
          if (table[k]) return "~" + table[k] + " km";
          return DASH;
        }

        function waMessage(detail, pageUrl) {
          var depCity = (detail.departure.name || detail.departure.code || "")
            .toUpperCase();
          var arrCity = (detail.arrival.name || detail.arrival.code || "")
            .toUpperCase();
          var fn = detail.flightNumber;
          var arrEst =
            detail.arrival.estimatedLocal ||
            detail.arrival.scheduledLocal ||
            DASH;
          var lines = [
            "\u2708\ufe0f " + fn,
            depCity + " \u2708 " + arrCity,
            "Tahmini var\u0131\u015f: " + arrEst,
            "Canl\u0131 takip: " + pageUrl,
          ];
          if (dateParam) lines.splice(1, 0, "Tarih: " + dateParam);
          return lines.join("\n");
        }

        function showCard(data, isDemo) {
          document.getElementById("state-loading").classList.add("hidden");
          document.getElementById("state-empty").classList.add("hidden");
          document.getElementById("state-card").classList.remove("hidden");
          var d = data.detail;
          document.getElementById("el-flight-no").textContent =
            d.flightNumber;
          document.getElementById("el-route").innerHTML =
            '<span class="plane-ico">\u2708</span> ' +
            (d.departure.name || d.departure.code).toUpperCase() +
            " \u2192 " +
            (d.arrival.name || d.arrival.code).toUpperCase();
          document.getElementById("el-airline-name").textContent =
            d.airlineName || "Havayolu";
          var iata = airlineIata(d.flightNumber);
          var logo = document.getElementById("el-airline-logo");
          var logoParent = logo.parentNode;
          var prevFb = logoParent.querySelector(".airline-logo.fallback");
          if (prevFb) prevFb.remove();
          logo.style.display = "block";
          logo.src =
            "https://images.kiwi.com/airlines/64x64/" + iata + ".png";
          logo.onerror = function () {
            logo.style.display = "none";
            if (logoParent.querySelector(".airline-logo.fallback")) return;
            var fb = document.createElement("div");
            fb.className = "airline-logo fallback";
            fb.textContent = iata;
            logoParent.appendChild(fb);
          };
          document.getElementById("el-city-o").textContent = (
            d.departure.name || d.departure.code
          ).toUpperCase();
          document.getElementById("el-city-d").textContent = (
            d.arrival.name || d.arrival.code
          ).toUpperCase();
          document.getElementById("el-arr-est").textContent =
            d.arrival.estimatedLocal ||
            d.arrival.scheduledLocal ||
            DASH;
          document.getElementById("el-gate").textContent =
            d.gate && d.gate !== DASH ? d.gate : DASH;
          document.getElementById("el-terminal").textContent =
            d.terminal && d.terminal !== DASH ? d.terminal : DASH;
          document.getElementById("el-dep-time").textContent =
            d.departure.estimatedLocal ||
            d.departure.scheduledLocal ||
            DASH;
          document.getElementById("el-aircraft").textContent =
            d.aircraftModel || DASH;
          document.getElementById("el-distance").textContent =
            approximateRouteKm(d);

          var pill = turkishPill(d);
          var pillEl = document.getElementById("el-pill");
          pillEl.textContent = pill.text;
          pillEl.className = "pill " + pill.cls;

          function tick() {
            var nowMs = Date.now();
            var pct = progressFromTimes(
              bestDepMs(d),
              bestArrMs(d),
              nowMs
            );
            if ((d.statusRaw || "").toLowerCase().indexOf("board") !== -1) {
              pct = Math.min(18, Math.max(8, pct || 10));
            }
            if (
              d.statusLabel === "Arrived" ||
              (d.statusRaw || "").toLowerCase().indexOf("arrived") !== -1
            ) {
              pct = 100;
            }
            renderCountdown(d, nowMs);
            document.getElementById("el-phase-text").textContent =
              phaseStripText(d, pct, nowMs);
            updatePathProgress(pct);
          }
          tick();
          setInterval(tick, 1000);
          bindParallax();

          var pageUrl = window.location.href.split("#")[0];
          document.getElementById("btn-wa").onclick = function () {
            var text = encodeURIComponent(waMessage(d, pageUrl));
            window.open("https://wa.me/?text=" + text, "_blank");
          };

          if (isDemo && !document.getElementById("flight-card-demo-note")) {
            var note = document.createElement("p");
            note.id = "flight-card-demo-note";
            note.className = "demo-badge";
            note.style.textAlign = "center";
            note.style.marginTop = "10px";
            note.textContent = "Demo veri — API kullanılamadı";
            document.querySelector(".wrap").appendChild(note);
          }
        }

        function showEmpty(msg) {
          document.getElementById("state-loading").classList.add("hidden");
          document.getElementById("state-card").classList.add("hidden");
          document.getElementById("state-empty").classList.remove("hidden");
          document.getElementById("empty-hint").textContent =
            window.location.pathname +
            "?flight=" +
            encodeURIComponent(flightParam) +
            "&airport=" +
            encodeURIComponent(airportParam) +
            (dateParam ? "&date=" + encodeURIComponent(dateParam) : "");
          document.getElementById("demo-note").textContent = msg || "";
        }

        var apiUrl =
          "/api/flight-detail?flight=" +
          encodeURIComponent(flightParam) +
          "&airport=" +
          encodeURIComponent(airportParam);

        fetch(apiUrl)
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, json: j };
            });
          })
          .then(function (res) {
            var j = res.json || {};
            if (j.found && j.detail) {
              showCard(j, false);
              return;
            }
            if (!res.ok) {
              applyDemoTimes(DEMO);
              showCard(DEMO, true);
              return;
            }
            showEmpty(
              j.error ||
                "Bu uçuş seçilen havalimanı listesinde bulunamadı."
            );
          })
          .catch(function () {
            applyDemoTimes(DEMO);
            showCard(DEMO, true);
          });
      })();
    </script>
  </body>
</html>
